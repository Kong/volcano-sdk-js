name: Pull Request Title

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened
      - edited

permissions: {}

defaults:
  run:
    shell: bash

jobs:
  pr-title:
    name: Pull Request Title
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Validate PR title
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          set -euo pipefail

          pattern='^(build|chore|ci|docs|feat|fix|perf|refactor|revert|style|test)(\([a-z0-9._/-]+\))?!?: .+$'

          if [[ ! "$PR_TITLE" =~ $pattern ]]; then
            printf 'PR title must use Conventional Commit format.\n'
            printf 'Examples: feat(api): add token refresh\n'
            printf '          fix(auth): handle expired sessions\n'
            printf 'Current title: %s\n' "$PR_TITLE"
            exit 1
          fi
