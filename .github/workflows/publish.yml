name: Publish SDK

on:
  push:
    branches:
      - main

permissions: {}

defaults:
  run:
    shell: bash

jobs:
  publish-latest:
    name: Publish latest
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: npm-production
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - name: Set up pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
        with:
          version: 10.34.1

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
          scope: '@volcano.dev'
          cache: 'pnpm'

      - name: Ensure npm supports trusted publishing
        run: |
          npm install -g npm@^11.5.1
          node --version
          npm --version

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run linting
        run: pnpm lint

      - name: Run tests
        run: pnpm test

      - name: Build SDK
        run: pnpm build

      - name: Smoke test packed package
        run: pnpm test:package

      - name: Validate package version
        run: |
          set -euo pipefail

          PKG_VERSION="$(node -p "require('./package.json').version")"

          if ! printf '%s' "$PKG_VERSION" | grep -Eq '^(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)$'; then
            echo "Stable releases must use MAJOR.MINOR.PATCH package versions."
            exit 1
          fi

      - name: Publish latest to npm
        run: |
          set -euo pipefail

          PKG_NAME="$(node -p "require('./package.json').name")"
          PKG_VERSION="$(node -p "require('./package.json').version")"

          if npm view "${PKG_NAME}@${PKG_VERSION}" version >/dev/null 2>&1; then
            echo "${PKG_NAME}@${PKG_VERSION} is already published; skipping npm publish."
            exit 0
          fi

          npm publish --tag latest

          echo "Published ${PKG_NAME}@${PKG_VERSION} with dist-tag: latest"
